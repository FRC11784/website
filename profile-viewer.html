<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CraftersMC Player & Profile Viewer</title>
    <meta property="og:title" content="CraftersMC Player & Profile Viewer">
    <meta property="og:description" content="View player data, SkyBlock profiles, and statistics">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#007bff">
    <link rel="icon" href="assets/cmc-icon.png" type="image/png">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="js/api-proxy-client.js"></script>
    <script src="js/script.js" defer></script>
    <link rel="stylesheet" href="css/essential.css">
    <style>
        /* Dark theme overrides */
        :root {
            --primary-color: #0ea5e9;
            --primary-color-hover: #0284c7;
            --card-bg-color: #0f1724;
            --card-bg-hover: #0b1220;
            --main-text-color: #e6eef8;
            --secondary-text-color: #9aa6b2;
            --border-color: #1f2937;
            --body-bg: #050814;
            --card-shadow-color: rgba(0, 0, 0, 0.6);
            --card-bg-hover: #0b1220;
        }

        body {
            background: var(--body-bg) !important;
            color: var(--main-text-color) !important;
        }

        /* Ensure key elements are readable on dark background */
        #scrollToTopBtn {
            background-color: var(--primary-color) !important;
        }

        .card,
        .data-section,
        .api-panel {
            background-color: var(--card-bg-color) !important;
            border-color: var(--border-color) !important;
            box-shadow: 0 6px 18px var(--card-shadow-color) !important;
        }

        #loader .material-icons {
            color: var(--primary-color) !important;
        }

        .profile-btn.active,
        .tab.active {
            background: var(--primary-color) !important;
        }
    </style>
    <style>
        body {
            font-family: Arial, sans-serif;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: url("../Backgrounds/IMG_4500Blurred.webp");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            margin-top: 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            color: var(--primary-text-color);
            margin-bottom: 10px;
        }

        .header p {
            color: var(--secondary-text-color);
            font-size: 1rem;
        }

        .api-panel {
            background-color: #00000087;
            border: 1px solid #111;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px var(--card-shadow-color);
        }

        .api-panel h2 {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: var(--main-text-color);
            font-size: 1.5rem;
        }

        .api-panel h2 .material-icons {
            color: var(--primary-color);
        }

        .input-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            color: var(--main-text-color);
            font-size: 0.95rem;
        }

        input,
        select {
            padding: 12px 15px;
            background: var(--body-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--main-text-color);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }

        input::placeholder {
            color: var(--secondary-text-color);
        }

        .btn {
            padding: 12px 24px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: var(--primary-color-hover);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-success {
            background: #28a745;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-danger {
            background: #dc3545;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .status {
            padding: 15px;
            border-radius: 4px;
            margin: 10px 0;
            display: none;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        .status.success {
            background: rgba(40, 167, 69, 0.2);
            border: 1px solid #28a745;
            color: #28a745;
            display: flex;
        }

        .status.error {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid #dc3545;
            color: #dc3545;
            display: flex;
        }

        .status.info {
            background: rgba(0, 123, 255, 0.2);
            border: 1px solid #007bff;
            color: #007bff;
            display: flex;
        }

        .data-section {
            background-color: var(--card-bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px var(--card-shadow-color);
        }

        .data-section h2 {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: var(--main-text-color);
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            font-size: 1.3rem;
        }

        .data-section h2 .material-icons {
            color: var(--primary-color);
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--secondary-text-color);
        }

        .loading .material-icons {
            font-size: 3rem;
            color: var(--primary-color);
            display: block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .card {
            background-color: var(--card-bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px var(--card-shadow-color);
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
            background-color: var(--card-bg-hover);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .card-header .material-icons {
            color: var(--primary-color);
            font-size: 1.3rem;
        }

        .card-title {
            font-weight: 700;
            color: var(--main-text-color);
            font-size: 1.1rem;
        }

        .card-body {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .data-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .darkmode .data-item {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .data-item:last-child {
            border-bottom: none;
        }

        .data-label {
            color: var(--secondary-text-color);
            font-weight: 500;
        }

        .data-value {
            color: var(--main-text-color);
            font-weight: 600;
            text-align: right;
            max-width: 60%;
            word-break: break-word;
        }

        .data-value.number {
            color: #28a745;
        }

        .data-value.boolean {
            color: #ffc107;
        }

        .data-value.string {
            color: #007bff;
        }

        .data-value.date {
            color: #9966ff;
        }

        .data-value.currency {
            color: #17a2b8;
        }

        .collapse-section {
            margin-bottom: 20px;
        }

        .collapse-header {
            background: var(--card-bg-color);
            padding: 15px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .collapse-header:hover {
            background: var(--card-bg-hover);
            border-color: var(--primary-color);
        }

        .collapse-header h3 {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--main-text-color);
            font-size: 1.1rem;
        }

        .collapse-header .material-icons {
            transition: transform 0.3s ease;
        }

        .collapse-header.collapsed .material-icons {
            transform: rotate(-90deg);
        }

        .collapse-content {
            padding: 20px;
            background: var(--card-bg-color);
            border: 1px solid var(--border-color);
            border-top: none;
            border-radius: 0 0 4px 4px;
            display: none;
        }

        .collapse-content.expanded {
            display: block;
        }

        .json-viewer {
            background: var(--body-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 20px;
            max-height: 600px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-break: break-all;
            color: var(--main-text-color);
        }

        .stats-grid {
            display: flex;
            justify-content: space-evenly;
        }

        .json-key {
            color: #d19a66;
        }

        .json-string {
            color: #98c379;
        }

        .json-number {
            color: #e06c75;
        }

        .json-boolean {
            color: #56b6c2;
        }

        .json-null {
            color: #c678dd;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0;
            flex-wrap: wrap;
        }

        .tab {
            padding: 12px 20px;
            background: transparent;
            border: none;
            color: var(--secondary-text-color);
            cursor: pointer;
            border-radius: 4px 4px 0 0;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .tab:hover {
            background: var(--card-bg-hover);
            color: var(--main-text-color);
        }

        .tab.active {
            background: var(--primary-color);
            color: white;
            border-bottom: 3px solid var(--primary-color);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .profile-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .profile-btn {
            padding: 10px 20px;
            background: var(--card-bg-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--secondary-text-color);
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .profile-btn:hover {
            border-color: var(--primary-color);
            color: var(--main-text-color);
            background: var(--card-bg-hover);
        }

        .profile-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .timestamp {
            font-size: 0.85rem;
            color: var(--secondary-text-color);
            margin-top: 30px;
            text-align: center;
            padding: 20px;
        }

        .gap {
            height: 80px;
        }

        #scrollToTopBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        #scrollToTopBtn:hover {
            background-color: var(--primary-color-hover);
        }

        @media (max-width: 768px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }

            .input-group {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .tabs {
                flex-wrap: wrap;
                gap: 5px;
            }

            .tab {
                padding: 10px 15px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<body>
    <div id="loader">
        <div></div>
        <div></div>
        <div></div>
    </div>

    <div class="top" id="top"></div>
    <div class="sidebar" id="sidebar"></div>
    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
    <span class="material-icons" id="scrollToTopBtn">north</span>
    <div class="gap"></div>

    <div class="container">
        <div class="header">
            <h1><span class="material-icons"
                    style="display: inline-block; vertical-align: middle; margin-right: 10px;">verified_user</span>CraftersMC
                Viewer</h1>
            <p>View player data, SkyBlock profiles, and bazaar market information</p>
        </div>

        <!-- Status Messages -->
        <div id="status" class="status"></div>

        <!-- Search Panel -->
        <div class="data-section">
            <h2><span class="material-icons">search</span> Search</h2>
            <div class="input-group">
                <div class="form-group">
                    <label for="username"><span class="material-icons"
                            style="font-size: 1rem; vertical-align: middle;">person</span> Username</label>
                    <input type="text" id="username" placeholder="Enter Minecraft username">
                </div>
                <div class="form-group">
                    <label for="profileId"><span class="material-icons"
                            style="font-size: 1rem; vertical-align: middle;">badge</span> Profile ID (Optional)</label>
                    <input type="text" id="profileId" placeholder="Enter profile ID (or leave blank for first profile)">
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-success" onclick="fetchPlayerData()">
                    <span class="material-icons">download</span> Fetch Player Data
                </button>
                <button class="btn" onclick="clearData()">
                    <span class="material-icons">delete</span> Clear
                </button>
            </div>
        </div>

        <!-- Loading Indicator -->
        <div id="loading" class="loading" style="display: none;">
            <span class="material-icons"
                style="animation: spin 1s linear infinite; display: inline-block;">hourglass_empty</span>
            <p>Loading data...</p>
        </div>

        <!-- Profile Selector -->
        <div id="profileSelector" class="profile-selector" style="display: none;"></div>

        <!-- Main Data Display -->
        <div id="mainData" style="display: none;">
            <!-- Tabs Navigation -->
            <div class="tabs">
                <button class="tab active" onclick="switchTab('overview')">Overview</button>
                <button class="tab" onclick="switchTab('player')">Player Data</button>
                <button class="tab" onclick="switchTab('profile')">Profile Data</button>
                <button class="tab" onclick="switchTab('playtime')">Time (hr)</button>
                <button class="tab" onclick="switchTab('statistics')">Statistics</button>
                <button class="tab" onclick="switchTab('slayers')">Slayers</button>
                <button class="tab" onclick="switchTab('farming')">Farming</button>
                <button class="tab" onclick="switchTab('minions')">Minions</button>
                <button class="tab" onclick="switchTab('collections')">Collections</button>
                <button class="tab" onclick="switchTab('inventory')">Inventory</button>
                <button class="tab" onclick="switchTab('skills')">Skills</button>
                <button class="tab" onclick="switchTab('json')">Raw JSON</button>
            </div>

            <!-- Tab Contents -->
            <div id="overviewTab" class="tab-content active">
                <!-- Overview content will be populated -->
            </div>

            <div id="playerTab" class="tab-content">
                <!-- Player data content will be populated -->
            </div>

            <div id="profileTab" class="tab-content">
                <!-- Profile data content will be populated -->
            </div>

            <div id="playtimeTab" class="tab-content">
                <!-- Time (hr) content will be populated -->
            </div>

            <div id="statisticsTab" class="tab-content">
                <!-- Statistics content will be populated -->
            </div>

            <div id="slayersTab" class="tab-content">
                <!-- Slayers content will be populated -->
            </div>

            <div id="farmingTab" class="tab-content">
                <!-- Farming content will be populated -->
            </div>

            <div id="minionsTab" class="tab-content">
                <!-- Minions content will be populated -->
            </div>

            <div id="collectionsTab" class="tab-content">
                <!-- Collections content will be populated -->
            </div>

            <div id="inventoryTab" class="tab-content">
                <!-- Inventory content will be populated -->
            </div>

            <div id="skillsTab" class="tab-content">
                <!-- Skills content will be populated -->
            </div>

            <div id="jsonTab" class="tab-content">
                <!-- Raw JSON content will be populated -->
            </div>
        </div>

        <div class="timestamp" id="timestamp"></div>
    </div>

    <script>
        // Configuration
        const DEFAULT_PROXY_URL = 'https://craftersmc-guides.pages.dev';

        // API Client
        let apiClient = new APIProxyClient(DEFAULT_PROXY_URL);

        // State
        let playerData = null;
        let profileData = null;
        let currentProfileId = '';
        let selectedMemberId = '';

        // Format functions
        function formatNumber(num) {
            if (num === null || num === undefined) return 'N/A';
            if (typeof num === 'number') {
                if (num >= 1000000) return (num / 1000000).toFixed(2) + 'M';
                if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
                return num.toLocaleString();
            }
            return num;
        }

        function formatDate(timestamp) {
            if (!timestamp) return 'N/A';
            try {
                // If timestamp is less than a reasonable millisecond value, assume it's in seconds
                let ms = timestamp;
                if (timestamp < 10000000000) {
                    ms = timestamp * 1000;
                }
                const date = new Date(ms);
                return date.toLocaleString();
            } catch {
                return timestamp;
            }
        }

        function formatBoolean(bool) {
            return bool ? 'Yes' : 'No';
        }

        function formatCurrency(amount) {
            if (amount === null || amount === undefined) return 'N/A';
            return formatNumber(amount);
        }

        // API Functions
        async function makeRequest(endpoint) {
            try {
                const response = await apiClient.makeRequest(endpoint);
                return response;
            } catch (error) {
                console.error('Request failed:', error);
                showStatus(`Request failed: ${error.message}`, 'error');
                return null;
            }
        }

        async function fetchPlayerData() {
            const username = document.getElementById('username').value.trim();
            if (!username) {
                showStatus('Please enter a username', 'error');
                return;
            }

            showLoading(true);
            showStatus('Fetching player data...', 'info');

            const data = await makeRequest(`/player/${username}`);
            if (!data) {
                showLoading(false);
                return;
            }

            playerData = data;
            console.log('playerData.sbClaimedCakes:', playerData?.sbClaimedCakes);
            showStatus('Player data loaded successfully!', 'success');

            // Display profiles if available
            if (playerData.stats?.skyBlock?.profiles) {
                displayProfiles(playerData.stats.skyBlock.profiles);
            }

            // Fetch profile data if profileId is provided
            const profileId = document.getElementById('profileId').value.trim();
            if (profileId) {
                await fetchProfileData(profileId);
            } else {
                // Fetch the first profile
                const profiles = playerData.stats?.skyBlock?.profiles;
                if (profiles && Object.keys(profiles).length > 0) {
                    const firstProfileId = Object.keys(profiles)[0];
                    await fetchProfileData(firstProfileId);
                } else {
                    showLoading(false);
                    displayPlayerData();
                }
            }
        }

        async function fetchProfileData(profileId) {
            showStatus(`Fetching profile data for ${profileId}...`, 'info');
            currentProfileId = profileId;

            const data = await makeRequest(`/profile/${profileId}`);
            if (!data) {
                showLoading(false);
                return;
            }

            profileData = data;
            console.log('profileData.claimedNewYearCakes:', profileData?.claimedNewYearCakes);
            showStatus('Profile data loaded successfully!', 'success');
            showLoading(false);

            // Display member selector
            displayMemberSelector();

            displayAllData();
        }

        // Display Functions
        function displayProfiles(profiles) {
            const selector = document.getElementById('profileSelector');
            selector.innerHTML = '';

            if (!profiles || Object.keys(profiles).length === 0) {
                selector.style.display = 'none';
                return;
            }

            selector.style.display = 'flex';

            Object.entries(profiles).forEach(([profileId, profile]) => {
                const btn = document.createElement('button');
                btn.className = 'profile-btn';
                if (profileId === currentProfileId) {
                    btn.classList.add('active');
                }

                btn.innerHTML = `
                    <i class="fas fa-id-card"></i>
                    ${profile.cuteName || 'Unknown'} (${profileId.substring(0, 8)}...)
                `;

                btn.onclick = () => fetchProfileData(profileId);
                selector.appendChild(btn);
            });
        }

        function displayMemberSelector() {
            const selector = document.getElementById('profileSelector');
            if (!profileData?.members || Object.keys(profileData.members).length === 0) {
                return;
            }

            // Create or get member selector container
            let memberSelector = document.getElementById('memberSelector');
            if (!memberSelector) {
                memberSelector = document.createElement('div');
                memberSelector.id = 'memberSelector';
                memberSelector.style.cssText = 'display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;';
                selector.parentNode.insertBefore(memberSelector, selector.nextSibling);
            }

            memberSelector.innerHTML = '<label style="align-self: center; color: #e2e8f0; font-weight: 500;">Members:</label>';

            Object.entries(profileData.members).forEach(([memberId, member]) => {
                const btn = document.createElement('button');
                btn.className = 'profile-btn';
                btn.style.cssText = 'padding: 8px 12px; font-size: 13px;';

                if (memberId === selectedMemberId) {
                    btn.classList.add('active');
                }

                // Try to get player name from playerData or use UUID
                let displayName = 'Unknown';
                if (playerData?.name && memberId === playerData.uuid.replace(/-/g, '')) {
                    displayName = playerData.name;
                } else if (member.nameHistory && member.nameHistory.length > 0) {
                    displayName = member.nameHistory[0];
                }

                // If still unknown, show UUID
                if (displayName === 'Unknown') {
                    displayName = memberId.substring(0, 8) + '...';
                }

                btn.innerHTML = `<i class="fas fa-user"></i> ${displayName}`;
                btn.onclick = () => {
                    selectedMemberId = memberId;
                    console.log('Selected member:', memberId, 'Name:', displayName, 'Member data:', member);
                    displayMemberSelector();
                    displayAllData();

            ]);

            // Farming Contest - format arrays nicely
            if (member.farmingContestData && Object.keys(member.farmingContestData).length > 0) {
                const contestData = {};
                Object.entries(member.farmingContestData).forEach(([key, value]) => {
                    if (Array.isArray(value)) {
                        contestData[key] = value.length > 0 ? value.join(', ') : 'N/A';
                    } else if (typeof value === 'object' && value !== null) {
                        // Format nested objects nicely
                        const nested = Object.entries(value).map(([k, v]) =>
                            Array.isArray(v) ? `${k}: [${v.join(', ')}]` : `${k}: ${v}`
                        ).join(' | ');
                        contestData[key] = nested;
                    } else {
                        contestData[key] = value;
                    }
                });

                const contestItems = Object.entries(contestData).map(([k, v]) => [k, v, 'string']);
                html += createDataCard('fas fa-leaf', 'Farming Contest Data', contestItems);
            } else {
                html += createDataCard('fas fa-leaf', 'Farming Contest', [

        function displayMinions() {
            const container = document.getElementById('minionsTab');
            if (!profileData?.craftedMinions || profileData.craftedMinions.length === 0) {
                container.innerHTML = '<div class="loading"><i class="fas fa-robot"></i><p>No minion data available</p></div>';
                return;
            }

            // Parse minions and get max level for each type
            const minionMap = {};
            profileData.craftedMinions.forEach(minion => {
                const match = minion.match(/^(.+?)_(\d+)$/);
                if (match) {
                    const type = match[1];
                    const level = parseInt(match[2]);
                    if (!minionMap[type] || level > minionMap[type]) {
                        minionMap[type] = level;
                    }
                }
            });

            const sortedMinions = Object.entries(minionMap)
                .sort((a, b) => b[1] - a[1])
                .map(([type, level]) => [type, formatNumber(level), 'number']);

            let html = '<div class="cards-grid">';

            // Summary Card
            html += createDataCard('fas fa-robot', 'Minion Summary', [
                ['Total Minion Types', formatNumber(Object.keys(minionMap).length), 'number'],
                ['Total Minions Crafted', formatNumber(profileData.craftedMinions.length), 'number'],
                ['Highest Minion Level', formatNumber(Math.max(...Object.values(minionMap))), 'number']
            ]);

            html += '</div>';

            // Detailed Minion List
            html += '<h3><i class="fas fa-list"></i> Minion Levels</h3>';
            html += '<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px;">';

            sortedMinions.forEach(([type, level]) => {
                html += `
                    <div class="card">
                        <div class="card-header">
                            <i class="fas fa-robot"></i>
                            <div class="card-title">${type}</div>
                        </div>
                        <div class="card-body">
                            <div class="data-item">
                                <span class="data-label">Max Level</span>
                                <span class="data-value number">${level}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            container.innerHTML = html;
        }

                    html += createCollapseSection('fas fa-skull', 'Slayer Data', member.slayerData);
                }

                // Quests
                if (member.quests) {
                    html += createCollapseSection('fas fa-tasks', 'Quests', member.quests, true);
                }

                // Kills & Deaths
                if (member.kills || member.deaths) {
                    const killsDeaths = {
                        kills: member.kills || {},
                        deaths: member.deaths || {}
                    };
                    html += createCollapseSection('fas fa-crosshairs', 'Kills & Deaths', killsDeaths);
                }

                // Boss Data
                if (member.bossKillTimes || member.bossKillCounts) {
                    const bossData = {
                        killTimes: member.bossKillTimes || {},
                        killCounts: member.bossKillCounts || {},
                        summonCounts: member.bossSummonCounts || {}
                    };
                    html += createCollapseSection('fas fa-dragon', 'Boss Data', bossData);
                }
            }

            container.innerHTML = html;
            setupCollapseButtons();
        }

        function displayJSON() {
            const container = document.getElementById('jsonTab');

            const allData = {
                player: playerData,
                profile: profileData,
                timestamp: new Date().toISOString()
            };

            container.innerHTML = `
                <h3><i class="fas fa-code"></i> Raw JSON Data</h3>
                <div class="tabs">
                    <button class="tab active" onclick="switchJsonTab('all')">All Data</button>
                    <button class="tab" onclick="switchJsonTab('player')">Player Only</button>
                    <button class="tab" onclick="switchJsonTab('profile')">Profile Only</button>
                </div>
                <div id="jsonAll" class="json-viewer">${syntaxHighlight(JSON.stringify(allData, null, 2))}</div>
                <div id="jsonPlayer" class="json-viewer" style="display: none;">${syntaxHighlight(JSON.stringify(playerData, null, 2))}</div>
                <div id="jsonProfile" class="json-viewer" style="display: none;">${syntaxHighlight(JSON.stringify(profileData, null, 2))}</div>
            `;
        }

        // Helper Functions
        // Font Awesome to Material Icons mapping
        const iconMap = {
            'fas fa-info-circle': 'info',
            'fas fa-sign-in-alt': 'login',
            'fas fa-users': 'group',
            'fas fa-tshirt': 'shopping_bag',
            'fas fa-id-card': 'badge',
            'fas fa-piggy-bank': 'savings',
            'fas fa-user-shield': 'security',
            'fas fa-map-marker-alt': 'location_on',
            'fas fa-hourglass-end': 'hourglass_bottom',
            'fas fa-gamepad': 'sports_esports',
            'fas fa-vote-yea': 'thumb_up',
            'fas fa-birthday-cake': 'cake',
            'fas fa-fist-raised': 'sports_mma',
            'fas fa-star': 'star',
            'fas fa-skull': 'skull',
            'fas fa-crosshairs': 'gps_fixed',
            'fas fa-magic': 'auto_fix_high',
            'fas fa-flask': 'science',
            'fas fa-pickaxe': 'construction',
            'fas fa-skull-crossbones': 'dangerous',
            'fas fa-dragon': 'pets',
            'fas fa-users': 'people',
            'fas fa-user-slash': 'person_off',
            'fas fa-location-arrow': 'navigation',
            'fas fa-clock': 'schedule',
            'fas fa-chart-bar': 'bar_chart',
            'fas fa-cog': 'settings',
            'fas fa-layer-group': 'layers',
            'fas fa-tractor': 'agriculture',
            'fas fa-leaf': 'local_florist',
            'fas fa-robot': 'smart_toy',
            'fas fa-list': 'list',
            'fas fa-box-open': 'unarchive',
            'fas fa-boxes': 'inventory_2',
            'fas fa-chart-line': 'trending_up',
            'fas fa-code': 'code',
            'fas fa-coins': 'toll',
        };

        function convertIcon(faIcon) {
            return iconMap[faIcon] || 'help';
        }

        function createDataCard(icon, title, items) {
            const materialIcon = convertIcon(icon);
            let html = `
                <div class="card">
                    <div class="card-header">
                        <span class="material-icons">${materialIcon}</span>
                        <div class="card-title">${title}</div>
                    </div>
                    <div class="card-body">
            `;

            items.forEach(([label, value, type]) => {
                html += `
                    <div class="data-item">
                        <span class="data-label">${label}</span>
                        <span class="data-value ${type}">${value || 'N/A'}</span>
                    </div>
                `;
            });

            html += `
                    </div>
                </div>
            `;

            return html;
        }

        function createCollapseSection(icon, title, data, isNested = false) {
            const id = title.replace(/\s+/g, '-').toLowerCase();
            const materialIcon = convertIcon(icon);

            let html = `
                <div class="collapse-section">
                    <div class="collapse-header" onclick="toggleCollapse('${id}')">
                        <h3><span class="material-icons">${materialIcon}</span> ${title} (${Object.keys(data).length} items)</h3>
                        <span class="material-icons">expand_more</span>
                    </div>
                    <div id="${id}" class="collapse-content">
            `;

            if (isNested && typeof data === 'object') {
                html += renderNestedObject(data, 0);
            } else {
                html += renderSimpleObject(data);
            }

            html += `
                    </div>
                </div>
            `;

            return html;
        }

        function renderSimpleObject(obj) {
            if (!obj || typeof obj !== 'object') {
                return `<div class="data-value">${obj}</div>`;
            }

            let html = '<div class="cards-grid">';

            const timeKeywords = ['playtime', 'time', 'duration', 'age', 'created', 'updated', 'joined', 'lastSeen', 'lastLogin', 'firstLogin', 'secondsSinceUpdate'];
            const isTimeData = Object.keys(obj).some(key => timeKeywords.some(keyword => key.toLowerCase().includes(keyword)));

            Object.entries(obj).forEach(([key, value]) => {
                let displayValue = value;
                let type = 'string';

                if (typeof value === 'number') {
                    const keyLower = key.toLowerCase();
                    if (isTimeData || timeKeywords.some(keyword => keyLower.includes(keyword))) {
                        displayValue = Math.floor(value / 3600).toLocaleString();
                    } else {
                        displayValue = value.toLocaleString();
                    }
                    type = 'number';
                } else if (typeof value === 'boolean') {
                    displayValue = formatBoolean(value);
                    type = 'boolean';
                } else if (Array.isArray(value)) {
                    displayValue = `[${value.length} items]`;
                    type = 'string';
                } else if (typeof value === 'string' && (value.includes('Z') || value.includes('T'))) {
                    displayValue = formatDate(value);
                    type = 'date';
                } else if (typeof value === 'object' && value !== null) {
                    displayValue = JSON.stringify(value);
                    type = 'string';
                }

                html += `
                    <div class="data-item">
                        <span class="data-label">${key}</span>
                        <span class="data-value ${type}">${displayValue}</span>
                    </div>
                `;
            });

            html += '</div>';
            return html;
        }

        function renderNestedObject(obj, depth = 0) {
            if (!obj || typeof obj !== 'object') {
                return `<div style="margin-left: ${depth * 20}px">${obj}</div>`;
            }

            let html = '';
            const timeKeywords = ['playtime', 'time', 'duration', 'age', 'created', 'updated', 'joined', 'lastSeen', 'lastLogin', 'firstLogin', 'secondsSinceUpdate'];

            Object.entries(obj).forEach(([key, value]) => {
                if (typeof value === 'object' && value !== null && !Array.isArray(value)) {
                    html += `
                        <div class="collapse-section" style="margin-left: ${depth * 10}px">
                            <div class="collapse-header" onclick="toggleCollapse('${key}-${depth}')">
                                <h3><i class="fas fa-folder"></i> ${key}</h3>
                                <i class="fas fa-chevron-down"></i>
                            </div>
                            <div id="${key}-${depth}" class="collapse-content">
                                ${renderNestedObject(value, depth + 1)}
                            </div>
                        </div>
                    `;
                } else {
                    let displayValue = value;
                    let type = 'string';

                    if (typeof value === 'number') {
                        const keyLower = key.toLowerCase();
                        if (timeKeywords.some(keyword => keyLower.includes(keyword))) {
                            displayValue = Math.floor(value / 3600).toLocaleString();
                        } else {
                            displayValue = value.toLocaleString();
                        }
                        type = 'number';
                    } else if (typeof value === 'boolean') {
                        displayValue = formatBoolean(value);
                        type = 'boolean';
                    } else if (Array.isArray(value)) {
                        if (value.length === 0) {
                            displayValue = '[]';
                        } else if (value.length <= 3 && typeof value[0] !== 'object') {
                            displayValue = '[' + value.join(', ') + ']';
                        } else {
                            displayValue = `[${value.length} items]`;
                        }
                        type = 'string';
                    } else if (typeof value === 'string' && (value.includes('Z') || value.includes('T'))) {
                        displayValue = formatDate(value);
                        type = 'date';
                    }

                    html += `
                        <div class="data-item" style="margin-left: ${depth * 20}px">
                            <span class="data-label">${key}</span>
                            <span class="data-value ${type}">${displayValue}</span>
                        </div>
                    `;
                }
            });

            return html;
        }

        function syntaxHighlight(json) {
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
                function (match) {
                    let cls = 'json-number';
                    if (/^"/.test(match)) {
                        if (/:$/.test(match)) {
                            cls = 'json-key';
                        } else {
                            cls = 'json-string';
                        }
                    } else if (/true|false/.test(match)) {
                        cls = 'json-boolean';
                    } else if (/null/.test(match)) {
                        cls = 'json-null';
                    }
                    return '<span class="' + cls + '">' + match + '</span>';
                });
        }

        // UI Functions
        function toggleCollapse(id) {
            const content = document.getElementById(id);
            const header = content.previousElementSibling;

            if (content.classList.contains('expanded')) {
                content.classList.remove('expanded');
                header.classList.add('collapsed');
            } else {
                content.classList.add('expanded');
                header.classList.remove('collapsed');
            }
        }

        function setupCollapseButtons() {
            document.querySelectorAll('.collapse-header').forEach(header => {
                header.classList.add('collapsed');
            });
        }

        function switchTab(tabName) {
            // Update tabs
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });

            // Activate selected tab
            document.querySelector(`.tab[onclick="switchTab('${tabName}')"]`).classList.add('active');
            document.getElementById(`${tabName}Tab`).classList.add('active');
        }

        function switchJsonTab(tabName) {
            document.querySelectorAll('#jsonTab .tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`#jsonTab .tab[onclick="switchJsonTab('${tabName}')"]`).classList.add('active');

            document.getElementById('jsonAll').style.display = tabName === 'all' ? 'block' : 'none';
            document.getElementById('jsonPlayer').style.display = tabName === 'player' ? 'block' : 'none';
            document.getElementById('jsonProfile').style.display = tabName === 'profile' ? 'block' : 'none';
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function showStatus(message, type = 'info') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;

            if (type === 'success' || type === 'error') {
                setTimeout(() => {
                    status.style.display = 'none';
                }, 5000);
            }
        }

        function updateTimestamp() {
            document.getElementById('timestamp').textContent =
                `Last updated: ${new Date().toLocaleString()}`;
        }

        function clearData() {
            playerData = null;
            profileData = null;
            currentProfileId = '';

            document.getElementById('username').value = '';
            document.getElementById('profileId').value = '';
            document.getElementById('profileSelector').style.display = 'none';
            document.getElementById('mainData').style.display = 'none';
            document.getElementById('timestamp').textContent = '';

            showStatus('Data cleared', 'success');
        }

        // Settings Functions
        function saveSettings() {
            showStatus('Settings saved successfully!', 'success');
        }

        function loadSettings() {
            // Settings are now hardcoded to use environment variables from Cloudflare
        }
        async function testConnection() {
            showStatus('Testing connection...', 'info');

            try {
                const proxyUrl = DEFAULT_PROXY_URL.replace(/\/$/, '');
                const response = await fetch(proxyUrl, {
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    showStatus('✓ Connection successful!', 'success');
                } else {
                    showStatus(`Connection failed: HTTP ${response.status}`, 'error');
                }
            } catch (error) {
                showStatus(`Connection failed: ${error.message}`, 'error');
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadSettings();

            // Auto-focus username input
            document.getElementById('username').focus();

            // Enter key support
            document.getElementById('username').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') fetchPlayerData();
            });
            document.getElementById('profileId').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') fetchPlayerData();
            });
        });
    </script>
