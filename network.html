<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Network Status - CraftersMC Guides</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="assets/cmc-icon.png" type="image/png" />
    <link rel="stylesheet" href="css/essential.css" />
    <link rel="stylesheet" href="css/network.css" />
    <script src="js/script.js" defer></script>
    <script src="js/network.js" defer></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
</head>

<body>
    <div id="loader" style="display:none">
        <div></div>
        <div></div>
        <div></div>
    </div>

    <div class="background"></div>

    <div class="sidebar" id="sidebar"></div>
    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div class="top"></div><br><br>

    <main class="network-hero">
        <div class="network-hero-inner">
            <div class="network-title">
                <h1>Network Status</h1>
                <p class="muted">Live status for CraftersMC network. Updated every time you refresh.</p>
            </div>

            <div class="network-actions">
                <a id="joinBtn" class="btn btn-join" href="https://craftersmc.net/play">Join CraftersMC</a>
                <button id="refreshBtn" class="btn btn-outline">Refresh</button>
            </div>

            <div class="network-top-info">
                <div class="bento-grid" id="bentoGrid">
                    <div class="bento" id="bento-active">
                        <div class="label">Active players</div>
                        <div class="value" id="activePlayers">—</div>
                        <div class="small" id="activePlayersSmall">Max: —</div>
                    </div>

                    <div class="bento" id="bento-status">
                        <div class="label">Status</div>
                        <div class="value" id="networkStatus">—</div>
                        <div class="small" id="whitelistRank">Whitelist: —</div>
                    </div>
                </div>
            </div>

            <section class="network-details">
                <h2>Details</h2>
                <div id="detailsContainer" class="details-container"></div>
            </section>
        </div>
    </main>

    <div id="footer"></div>
</body>

</html>
