<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Minecraft Tooltip Replica</title>

    <style>
        @font-face {
            font-family: 'Minecraft';
            src: local('Minecraft'), local('Minecraftia');
        }

        body {
            background: #2b2b2b;
            padding: 40px;
            font-family: 'Minecraft', monospace;
        }

        .item-slot {
            position: relative;
            width: 48px;
        }

        .item-slot img {
            width: 48px;
            height: 48px;
            cursor: pointer;
            image-rendering: pixelated;
        }

        /* ================= Tooltip Core ================= */

        .tooltip {
            position: absolute;
            top: 0;
            left: 60px;
            width: max-content;
            display: block;
            z-index: 10;
        }

        .mc-frame {
            position: relative;
            padding: 10px;
            background: linear-gradient(#1a0f1f, #120915);
            color: #dcdcdc;
            font-size: 14px;
            line-height: 1.3;
            width: calc(90% - 2px);
            height: calc(90% - 2px);
        }

        .mc-content {
            position: relative;
            z-index: 2;
        }

        /* ================= Corners ================= */

        .mc-corner {
            position: absolute;
            width: 2px;
            height: 2px;
            z-index: 3;
        }

        .mc-corner.tl {
            top: 0;
            left: 0;
            background: #000;
        }

        .mc-corner.tr {
            top: 0;
            right: 0px;
            background: #000;
        }

        .mc-corner.bl {
            bottom: 0;
            left: 0;
            background: #000;
        }

        .mc-corner.br {
            bottom: 0;
            right: 0;
            background: #000;
        }

        /* ================= Edges ================= */

        .mc-edge {
            position: absolute;
            z-index: 1;
            background: #2c0863;
        }

        .mc-edge.top {
            top: 0;
            left: 2px;
            right: 4px;
            height: 2px;
            box-shadow: 0 -2px 0 #000;
            width: 198.5px;
        }

        .mc-edge.bottom {
            bottom: 2px;
            left: 2px;
            right: 4px;
            height: 2px;
            box-shadow: 0 2px 0 #000;
            width: 198.5px;
        }

        .mc-edge.left {
            top: 2px;
            bottom: 4px;
            left: 0;
            width: 2px;
            height: 207.5px;
            box-shadow: -2px 0 0 #000;
        }

        .mc-edge.right {
            top: 2px;
            bottom: 4px;
            right: 0px;
            width: 2px;
            height: 207px;
            box-shadow: 2px 0 0 #000;
        }

        /* ================= Text Styling ================= */

        .title {
            color: #55ff55;
            font-weight: bold;
        }

        .rarity {
            color: #55ff55;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .row {
            display: flex;
            gap: 4px;
        }

        .gold {
            color: #ffaa00;
        }

        .muted {
            color: #aaaaaa;
            font-size: 13px;
        }

        .spacer {
            height: 6px;
        }

        .cta {
            color: #ffff55;
            margin-top: 6px;
        }
    </style>
</head>

<body>

<div class="item-slot">

    <div class="tooltip">
        <div class="mc-frame">

            <!-- Corners -->
            <div class="mc-corner tl"></div>
            <div class="mc-corner tr"></div>
            <div class="mc-corner bl"></div>
            <div class="mc-corner br"></div>

            <!-- Edges -->
            <div class="mc-edge top"></div>
            <div class="mc-edge bottom"></div>
            <div class="mc-edge left"></div>
            <div class="mc-edge right"></div>

            <!-- Content -->
            <div class="mc-content">
                <div class="title">Enchanted Carrot</div>
                <div class="rarity">UNCOMMON</div>

                <div class="spacer"></div>

                <div class="row">
                    <span>Buy price:</span>
                    <span class="gold">288.6</span>
                </div>
                <div class="muted">Supply volume: 9,835</div>

                <div class="spacer"></div>

                <div class="row">
                    <span>Sell price:</span>
                    <span class="gold">121.9</span>
                </div>
                <div class="muted">Demand volume: 34,662</div>

                <div class="spacer"></div>

                <div class="row">
                    <span>7d Avg. price:</span>
                    <span class="gold">198.67</span>
                </div>

                <div class="cta">Click to view details!</div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
