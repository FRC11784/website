<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" href="assets/cmc-icon.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="2026 April Fools Melon Event Leaderboard">
    <meta property="og:description"
        content="See the leaderboard for the 2026 April Fools Melon Event on CraftersMC Skyblock.">
    <meta property="og:image" content="assets/farming/Melon_JE2_BE2.png">
    <meta property="og:url" content="https://craftersmc-guides.pages.dev/april-fools-melon-event-leaderboard.html">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#007bff">
    <title>2026 April Fools Melon Event Leaderboard</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="js/script.js"></script>
    <link rel="stylesheet" href="css/essential.css">
    <link rel="stylesheet" href="css/collections-leaderboards.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            color: var(--main-text-color);
            text-align: center;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: url("../Backgrounds/2026_april_fools_melon_event.png");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;

        }

        tbody tr:nth-child(1) {
            background: #ffd90025;
            color: #ffd900;
        }

        tbody tr:nth-child(2) {
            background: #c0c0c025;
            color: #d4d4d4;
        }

        tbody tr:nth-child(3) {
            background: #CD7F3225;
            color: #CD7F32;
        }

        tbody tr {
            background: #33333325;
            color: white;
            cursor: pointer;
        }

        table {
            background-color: #0000000c;
        }

        th {
            background-color: #007bff60;
        }
    </style>
</head>

<body>
    <div id="loader">
        <div></div>
        <div></div>
        <div></div>
    </div>
    <div id="sidebar-overlay" onclick="overlay()"></div>

    <div class="top"></div>
    <div class="gap"></div>
    <div class="sidebar" id="sidebar"></div>

    <div class="lb-container">
        <h3 class="lb-h3">2026 April Fools Melon Event Leaderboard</h3>
        
        <div class="lb-leaderboard">
            <h2 class="lb-h2">Top Melon Collectors</h2>
            <table class="slay-lb-table">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Player</th>
                        <th>Melons</th>
                    </tr>
                </thead>
                <tbody id="leaderboardData">
                    <tr>
                        <td>1</td>
                        <td>???</td>
                        <td>???</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="footer"></div>

    <script>
        const melonEventLeaderboard = [
            { rank: 1, name: "HollowSpooky", melons: "43,807" },
            { rank: 2, name: "KaosTheChaos", melons: "42,677" },
            { rank: 3, name: "MeorderFisch", melons: "40,710" },
            { rank: 4, name: "Tekkxz", melons: "40,429" },
            { rank: 5, name: "YHGamerBoy", melons: "40,000" },
            { rank: 6, name: "AndyGamer024", melons: "39,069" },
            { rank: 7, name: "HeGzoStRqFe", melons: "38,074" },
            { rank: 8, name: "gelacktic", melons: "37,802" },
            { rank: 9, name: "sboi146433", melons: "35,449" },
            { rank: 10, name: "Aryaan045", melons: "34,958" }
        ];

        document.addEventListener("DOMContentLoaded", () => {
            const leaderboardData = document.getElementById("leaderboardData");
            leaderboardData.innerHTML = melonEventLeaderboard.map(player => `
                <tr>
                    <td>${player.rank}</td>
                    ${createPlayerCell(player.name)}
                    <td>${player.melons}</td>
                </tr>
            `).join("");
        });
    </script>
</body>

</html>
